<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Package Download Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f7f8fa;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e2e4e9;
      padding: 1.5rem 2rem;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    header p {
      color: #6b7280;
      font-size: 0.9rem;
    }

    .controls {
      background: #fff;
      border-bottom: 1px solid #e2e4e9;
      padding: 1rem 2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
    }

    .input-group {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .registry-toggle {
      display: flex;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      overflow: hidden;
    }

    .registry-toggle button {
      padding: 0.5rem 0.75rem;
      border: none;
      background: #f3f4f6;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      color: #6b7280;
    }

    .registry-toggle button.active {
      color: #fff;
    }

    .registry-toggle button[data-registry="cran"].active {
      background: #1d63b8;
    }

    .registry-toggle button[data-registry="pypi"].active {
      background: #3572A5;
    }

    .registry-toggle button:hover:not(.active) {
      background: #e5e7eb;
    }

    #pkg-input {
      padding: 0.5rem 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.9rem;
      width: 220px;
      outline: none;
      transition: border-color 0.15s;
    }

    #pkg-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    #add-btn {
      padding: 0.5rem 1rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    #add-btn:hover { background: #1d4ed8; }

    .time-range {
      display: flex;
      gap: 0.25rem;
      margin-left: auto;
    }

    .time-range button {
      padding: 0.4rem 0.75rem;
      background: #f3f4f6;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
      color: #374151;
    }

    .time-range button.active {
      background: #2563eb;
      color: #fff;
      border-color: #2563eb;
    }

    .time-range button:hover:not(.active) {
      background: #e5e7eb;
    }

    .packages-bar {
      padding: 0.75rem 2rem;
      background: #fff;
      border-bottom: 1px solid #e2e4e9;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      min-height: 2.75rem;
      align-items: center;
    }

    .packages-bar:empty::after {
      content: "Add a package above to get started";
      color: #9ca3af;
      font-size: 0.85rem;
    }

    .pkg-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.3rem 0.6rem;
      border-radius: 9999px;
      font-size: 0.8rem;
      font-weight: 600;
      color: #fff;
      cursor: default;
    }

    .pkg-chip .registry-badge {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      background: rgba(255,255,255,0.25);
      padding: 0.1rem 0.3rem;
      border-radius: 3px;
      letter-spacing: 0.03em;
    }

    .pkg-chip .remove {
      cursor: pointer;
      margin-left: 0.15rem;
      opacity: 0.7;
      font-size: 1rem;
      line-height: 1;
      transition: opacity 0.15s;
    }

    .pkg-chip .remove:hover { opacity: 1; }

    .chart-container {
      flex: 1;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
    }

    .chart-wrapper {
      flex: 1;
      position: relative;
      background: #fff;
      border-radius: 10px;
      border: 1px solid #e2e4e9;
      padding: 1rem;
      min-height: 400px;
    }

    #chart-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9ca3af;
      font-size: 1rem;
    }

    .smoothing-toggle {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: #6b7280;
    }

    .smoothing-toggle input { cursor: pointer; }

    .status {
      padding: 0.5rem 2rem;
      font-size: 0.8rem;
      color: #6b7280;
      min-height: 1.5rem;
    }

    .status.error { color: #dc2626; }

    footer {
      padding: 1rem 2rem;
      text-align: center;
      font-size: 0.8rem;
      color: #9ca3af;
      border-top: 1px solid #e2e4e9;
      background: #fff;
    }

    footer a {
      color: #2563eb;
      text-decoration: none;
    }

    footer a:hover { text-decoration: underline; }

    @media (max-width: 640px) {
      header, .controls, .packages-bar, .chart-container, .status {
        padding-left: 1rem;
        padding-right: 1rem;
      }
      #pkg-input { width: 150px; }
      .time-range { margin-left: 0; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Package Download Viewer</h1>
    <p>Compare CRAN and PyPI package downloads side by side.</p>
  </header>

  <div class="controls">
    <div class="input-group">
      <div class="registry-toggle">
        <button data-registry="cran" class="active">CRAN</button>
        <button data-registry="pypi">PyPI</button>
      </div>
      <input type="text" id="pkg-input" placeholder="Enter package name..." autocomplete="off" spellcheck="false">
      <button id="add-btn">Add</button>
    </div>
    <div class="smoothing-toggle">
      <input type="checkbox" id="smooth-toggle" checked>
      <label for="smooth-toggle">7-day rolling average</label>
    </div>
    <div class="time-range">
      <button data-range="last-week">1W</button>
      <button data-range="last-month" class="active">1M</button>
      <button data-range="last-3-months">3M</button>
      <button data-range="last-6-months">6M</button>
    </div>
  </div>

  <div class="packages-bar" id="packages-bar"></div>

  <div class="status" id="status"></div>

  <div class="chart-container">
    <div class="chart-wrapper">
      <div id="chart-placeholder">Add a package to see download statistics</div>
      <canvas id="chart"></canvas>
    </div>
  </div>

  <footer>
    MIT License &middot; Built by <a href="https://github.com/maflot" target="_blank" rel="noopener">maflot</a>
    &middot; Data from <a href="https://cranlogs.r-pkg.org/" target="_blank" rel="noopener">cranlogs</a>
    &amp; <a href="https://pypistats.org/" target="_blank" rel="noopener">pypistats</a>
  </footer>

<script>
(function () {
  const COLORS = [
    '#2563eb', '#dc2626', '#16a34a', '#d97706', '#7c3aed',
    '#db2777', '#0891b2', '#65a30d', '#ea580c', '#6366f1',
    '#0d9488', '#c026d3', '#ca8a04', '#e11d48', '#4f46e5',
  ];

  const CRAN_API = 'https://cranlogs.r-pkg.org/downloads/daily';
  const PYPI_API = 'https://pypistats.org/api/packages';
  const CORS_PROXY = 'https://corsproxy.io/?';

  // Retry a fetch up to `retries` times with a delay between attempts
  async function fetchWithRetry(url, retries = 2, delay = 800) {
    for (let attempt = 0; attempt <= retries; attempt++) {
      const res = await fetch(url);
      if (res.ok) {
        const data = await res.json();
        if (data && !data.error) return data;
        if (data && data.error) throw new Error(data.error);
      }
      if (attempt < retries) {
        await new Promise(r => setTimeout(r, delay * (attempt + 1)));
      }
    }
    throw new Error('Failed after retries');
  }

  let packages = [];   // { name, registry, color, rawData }
  let colorIdx = 0;
  let chart = null;
  let currentRange = 'last-month';
  let currentRegistry = 'cran';
  let smoothing = true;

  const input = document.getElementById('pkg-input');
  const addBtn = document.getElementById('add-btn');
  const bar = document.getElementById('packages-bar');
  const statusEl = document.getElementById('status');
  const placeholder = document.getElementById('chart-placeholder');
  const smoothToggle = document.getElementById('smooth-toggle');
  const canvas = document.getElementById('chart');

  // --- Registry toggle ---
  document.querySelectorAll('.registry-toggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelector('.registry-toggle .active').classList.remove('active');
      btn.classList.add('active');
      currentRegistry = btn.dataset.registry;
      input.placeholder = currentRegistry === 'cran'
        ? 'Enter R package name...'
        : 'Enter Python package name...';
    });
  });

  // --- URL hash state ---
  // Format: #packages=cran:ggplot2,pypi:numpy
  function saveState() {
    const entries = packages.map(p => `${p.registry}:${p.name}`);
    const hash = entries.length ? `#packages=${entries.join(',')}` : '';
    history.replaceState(null, '', location.pathname + hash);
    localStorage.setItem('pkg_downloads', JSON.stringify(entries));
  }

  function loadState() {
    const hash = location.hash;
    let raw;
    if (hash.startsWith('#packages=')) {
      raw = hash.slice('#packages='.length).split(',').filter(Boolean);
    } else {
      try {
        const stored = JSON.parse(localStorage.getItem('pkg_downloads'));
        if (Array.isArray(stored)) raw = stored.filter(Boolean);
      } catch {}
    }
    if (!raw) return [];
    return raw.map(entry => {
      // Support new format "cran:pkg" and legacy format "pkg" (assume cran)
      const idx = entry.indexOf(':');
      if (idx > 0) {
        return { registry: entry.slice(0, idx), name: entry.slice(idx + 1) };
      }
      return { registry: 'cran', name: entry };
    });
  }

  // --- Date helpers ---
  function daysAgo(n) {
    const d = new Date();
    d.setDate(d.getDate() - n);
    return d.toISOString().slice(0, 10);
  }

  function rangeToDays(range) {
    switch (range) {
      case 'last-week': return 7;
      case 'last-month': return 30;
      case 'last-3-months': return 90;
      case 'last-6-months': return 180;
      default: return 30;
    }
  }

  // --- CRAN API ---
  function cranApiPath(range) {
    if (range === 'last-week' || range === 'last-month') return range;
    const today = new Date().toISOString().slice(0, 10);
    const start = daysAgo(rangeToDays(range));
    return `${start}:${today}`;
  }

  async function fetchCranDownloads(pkgName, range) {
    const apiPath = cranApiPath(range);
    const target = `${CRAN_API}/${apiPath}/${encodeURIComponent(pkgName)}`;
    const url = `${CORS_PROXY}${encodeURIComponent(target)}`;
    const data = await fetchWithRetry(url);
    if (!Array.isArray(data) || !data[0] || !Array.isArray(data[0].downloads)) {
      throw new Error(`CRAN package "${pkgName}" not found`);
    }
    return data[0].downloads;
  }

  // --- PyPI API ---
  async function fetchPypiDownloads(pkgName, range) {
    const target = `${PYPI_API}/${encodeURIComponent(pkgName)}/overall?mirrors=true`;
    const url = `${CORS_PROXY}${encodeURIComponent(target)}`;
    const data = await fetchWithRetry(url);
    if (!data.data || !Array.isArray(data.data)) {
      throw new Error(`PyPI package "${pkgName}" not found`);
    }

    const withMirrors = data.data
      .filter(d => d.category === 'with_mirrors')
      .map(d => ({ day: d.date, downloads: d.downloads }))
      .sort((a, b) => a.day.localeCompare(b.day));

    const days = rangeToDays(range);
    const cutoff = daysAgo(days);
    return withMirrors.filter(d => d.day >= cutoff);
  }

  // --- Unified fetch ---
  async function fetchDownloads(pkgName, registry, range) {
    if (registry === 'pypi') return fetchPypiDownloads(pkgName, range);
    return fetchCranDownloads(pkgName, range);
  }

  // --- Smoothing ---
  function rollingAverage(data, window) {
    if (window <= 1) return data;
    return data.map((point, i) => {
      const start = Math.max(0, i - window + 1);
      const slice = data.slice(start, i + 1);
      const avg = slice.reduce((s, p) => s + p.downloads, 0) / slice.length;
      return { day: point.day, downloads: Math.round(avg) };
    });
  }

  // --- Chart ---
  function initChart() {
    const ctx = canvas.getContext('2d');
    chart = new Chart(ctx, {
      type: 'line',
      data: { datasets: [] },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(0,0,0,0.8)',
            titleFont: { size: 13 },
            bodyFont: { size: 12 },
            padding: 10,
            cornerRadius: 6,
            callbacks: {
              label: function(ctx) {
                return `${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()}`;
              }
            }
          }
        },
        scales: {
          x: {
            type: 'time',
            time: { unit: 'day', tooltipFormat: 'MMM d, yyyy' },
            grid: { display: false },
            ticks: { maxTicksLimit: 12 }
          },
          y: {
            beginAtZero: true,
            grid: { color: '#f0f0f0' },
            ticks: {
              callback: function(v) {
                if (v >= 1000000) return (v / 1000000).toFixed(v >= 10000000 ? 0 : 1) + 'M';
                if (v >= 1000) return (v / 1000).toFixed(v >= 10000 ? 0 : 1) + 'k';
                return v;
              }
            }
          }
        }
      }
    });
  }

  function updateChart() {
    if (!chart) initChart();
    const datasets = packages.filter(pkg => Array.isArray(pkg.rawData)).map(pkg => {
      const data = smoothing ? rollingAverage(pkg.rawData, 7) : pkg.rawData;
      const label = `${pkg.name} (${pkg.registry.toUpperCase()})`;
      return {
        label,
        data: data.map(d => ({ x: d.day, y: d.downloads })),
        borderColor: pkg.color,
        backgroundColor: pkg.color + '18',
        borderWidth: 2,
        pointRadius: 0,
        pointHitRadius: 8,
        tension: 0.3,
        fill: false,
      };
    });
    chart.data.datasets = datasets;
    chart.update();
    placeholder.style.display = packages.length ? 'none' : 'flex';
  }

  // --- Chips ---
  function renderChips() {
    bar.innerHTML = '';
    packages.forEach(pkg => {
      const chip = document.createElement('span');
      chip.className = 'pkg-chip';
      chip.style.background = pkg.color;
      const key = `${pkg.registry}:${pkg.name}`;
      chip.innerHTML = `<span class="registry-badge">${pkg.registry}</span>${pkg.name}<span class="remove" data-pkg="${key}">&times;</span>`;
      bar.appendChild(chip);
    });
  }

  bar.addEventListener('click', (e) => {
    if (e.target.classList.contains('remove')) {
      removePackage(e.target.dataset.pkg);
    }
  });

  // --- Add / Remove ---
  async function addPackage(name, registry) {
    registry = registry || currentRegistry;
    // PyPI requires lowercase; CRAN is case-sensitive — preserve user input
    name = registry === 'pypi' ? name.trim().toLowerCase() : name.trim();
    if (!name) return;
    const key = `${registry}:${name}`;
    if (packages.find(p => `${p.registry}:${p.name}` === key)) {
      setStatus(`"${name}" (${registry.toUpperCase()}) is already added`, true);
      return;
    }

    setStatus(`Fetching ${registry.toUpperCase()} data for "${name}"...`);
    try {
      const rawData = await fetchDownloads(name, registry, currentRange);
      const color = COLORS[colorIdx % COLORS.length];
      colorIdx++;
      packages.push({ name, registry, color, rawData });
      saveState();
      renderChips();
      updateChart();
      setStatus('');
    } catch (err) {
      setStatus(err.message, true);
    }
  }

  function removePackage(key) {
    packages = packages.filter(p => `${p.registry}:${p.name}` !== key);
    saveState();
    renderChips();
    updateChart();
    setStatus('');
  }

  async function refreshAll() {
    if (!packages.length) return;
    setStatus('Refreshing...');
    try {
      await Promise.all(packages.map(async (pkg) => {
        pkg.rawData = await fetchDownloads(pkg.name, pkg.registry, currentRange);
      }));
      updateChart();
      setStatus('');
    } catch (err) {
      setStatus(err.message, true);
    }
  }

  // --- Status ---
  function setStatus(msg, isError) {
    statusEl.textContent = msg;
    statusEl.className = isError ? 'status error' : 'status';
  }

  // --- Events ---
  addBtn.addEventListener('click', () => {
    addPackage(input.value);
    input.value = '';
    input.focus();
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      addPackage(input.value);
      input.value = '';
    }
  });

  document.querySelectorAll('.time-range button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelector('.time-range .active').classList.remove('active');
      btn.classList.add('active');
      currentRange = btn.dataset.range;
      refreshAll();
    });
  });

  smoothToggle.addEventListener('change', () => {
    smoothing = smoothToggle.checked;
    updateChart();
  });

  // --- Init ---
  initChart();
  const initial = loadState();
  if (initial.length) {
    (async () => {
      for (const entry of initial) {
        await addPackage(entry.name, entry.registry);
      }
    })();
  }
})();
</script>

</body>
</html>
